services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buildflow
      POSTGRES_PASSWORD: buildflow
      POSTGRES_DB: buildflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for local development (site photos, receipts, docs).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://buildflow:buildflow@db:5432/buildflow?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: buildflow
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_PUBLIC_URL: http://localhost:9000/buildflow
    ports:
      - "3000:3000"

volumes:
  db_data:
  minio_data:
